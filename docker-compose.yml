services:
  2fauth:
    image: 2fauth/2fauth:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      APP_NAME: 2FAuth
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      IS_DEMO_APP: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      DB_DATABASE: /srv/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_DRIVER: file
      TRUSTED_PROXIES: "*"
    volumes:
      - 2fauth-data:/2fauth
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  2fauth-data:
